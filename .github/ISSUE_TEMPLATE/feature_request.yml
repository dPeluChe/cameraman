name: Feature request
description: Suggest an improvement or new feature
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describe the *problem* first, then your idea — it helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Cameraman doesn't support well today?
      placeholder: "When I record long sessions I lose track of which take is which because they're all named by timestamp."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Your idea. Sketches, mockups or examples from other apps are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're worse.

  - type: dropdown
    id: scope
    attributes:
      label: Estimated scope
      description: Rough size from a contributor's perspective.
      options:
        - Small (≤ 1 day)
        - Medium (1–3 days)
        - Large (≥ 1 week)
        - Don't know

  - type: textarea
    id: notes
    attributes:
      label: Additional context
