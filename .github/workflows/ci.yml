name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enginekit:
    name: EngineKit build + test
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Resolve packages
        working-directory: EngineKit
        run: swift package resolve

      - name: Build (debug)
        working-directory: EngineKit
        run: swift build --build-tests

      - name: Test
        working-directory: EngineKit
        # Some suites require macOS APIs that don't work on CI runners:
        #   CaptureEngineIntegrationTests — needs ScreenCaptureKit / display access
        #   CrashReporterTests             — singleton + file I/O races on parallel
        #   HotkeyManagerTests             — needs accessibility-trusted event taps
        # Unblock these locally before un-skipping them in CI.
        run: |
          swift test --parallel \
            --skip CaptureEngineIntegrationTests \
            --skip CrashReporterTests \
            --skip HotkeyManagerTests

  # Note: app-build job (xcodebuild on CameramanApp.xcodeproj) is intentionally
  # NOT wired here yet because `*.xcodeproj` is currently gitignored. Enable it
  # once the Xcode project file is tracked or replaced with XcodeGen/Tuist.
  #
  # When ready, the job runs on macos-14, selects Xcode 15.4, and does:
  #   xcodebuild -project CameramanApp/CameramanApp.xcodeproj \
  #              -scheme CameramanApp -configuration Release \
  #              -destination 'generic/platform=macOS' \
  #              CODE_SIGNING_ALLOWED=NO ARCHS=arm64 clean build
