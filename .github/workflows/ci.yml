name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enginekit:
    name: EngineKit build + test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Resolve packages
        working-directory: EngineKit
        run: swift package resolve

      - name: Build (debug)
        working-directory: EngineKit
        run: swift build --build-tests

      - name: Test
        working-directory: EngineKit
        # The full suite (912 tests, 34+ files) runs in ~35-40 min on a 3-core
        # macos-14 runner because many suites contain Task.sleep/Thread.sleep
        # or wait for permissions that never grant on CI. Skip the slow /
        # environment-dependent ones in CI; they still run locally with
        # `swift test` from EngineKit/.
        #
        #   System / permission state (cannot grant on CI):
        #     CaptureEngineIntegrationTests — ScreenCaptureKit display access
        #     HotkeyManagerTests            — accessibility-trusted event taps
        #     PermissionManagerTests        — permission status flapping
        #     KeystrokeRecorderTests        — event taps
        #
        #   Heavy I/O or background scheduling (slow + flaky in parallel):
        #     ProjectStoreTests             — file-system heavy
        #     JobQueueTests                 — timer-driven background jobs
        #     ThumbnailCacheTests           — disk + image decode
        #     PreviewEngineTests            — AVFoundation player integration
        #     OverlayEditViewTests          — view + composition
        #     ExportEngineTests             — full export render
        #     CrashReporterTests            — singleton + file I/O races
        #
        #   External / network deps:
        #     AIServiceTests
        #     LocalAIProviderTests
        run: |
          swift test --parallel \
            --skip CaptureEngineIntegrationTests \
            --skip HotkeyManagerTests \
            --skip PermissionManagerTests \
            --skip KeystrokeRecorderTests \
            --skip ProjectStoreTests \
            --skip JobQueueTests \
            --skip ThumbnailCacheTests \
            --skip PreviewEngineTests \
            --skip OverlayEditViewTests \
            --skip ExportEngineTests \
            --skip CrashReporterTests \
            --skip AIServiceTests \
            --skip LocalAIProviderTests

  # Note: app-build job (xcodebuild on CameramanApp.xcodeproj) is intentionally
  # NOT wired here yet because `*.xcodeproj` is currently gitignored. Enable it
  # once the Xcode project file is tracked or replaced with XcodeGen/Tuist.
  #
  # When ready, the job runs on macos-14, selects Xcode 15.4, and does:
  #   xcodebuild -project CameramanApp/CameramanApp.xcodeproj \
  #              -scheme CameramanApp -configuration Release \
  #              -destination 'generic/platform=macOS' \
  #              CODE_SIGNING_ALLOWED=NO ARCHS=arm64 clean build
